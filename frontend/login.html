<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareCompanion - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 450px;
            text-align: center;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #dc2626;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .info-box {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 12px;
            color: #475569;
        }

        .sample-ids {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }

        .sample-id {
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 15px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sample-id:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🏥</div>
        <h1>CareCompanion AI</h1>
        <p class="subtitle">Your Personal Healthcare Assistant</p>

        <div class="input-group">
            <label>🔑 Enter Your Patient ID</label>
            <input type="number" id="patientId" placeholder="e.g., 1001, 1002, or any patient number" autofocus>
        </div>

        <button onclick="login()">Continue to Chat →</button>

        <div class="error-message" id="errorMessage">
            ⚠️ Patient ID not found. Please check and try again.
        </div>

        <div class="info-box">
            💡 <strong>Sample Patient IDs:</strong>
            <div class="sample-ids" id="sampleIds">
                <span class="sample-id" onclick="fillId(1001)">1001</span>
                <span class="sample-id" onclick="fillId(1002)">1002</span>
                <span class="sample-id" onclick="fillId(1003)">1003</span>
                <span class="sample-id" onclick="fillId(1004)">1004</span>
                <span class="sample-id" onclick="fillId(1005)">1005</span>
            </div>
            <div style="margin-top: 10px;">
                🔍 Any patient ID works! The system will fetch their data from the backend.
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://chatbot-backend-cxpy.onrender.com/api';

        async function login() {
            const patientId = document.getElementById('patientId').value;
            const errorDiv = document.getElementById('errorMessage');
            
            if (!patientId) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '⚠️ Please enter your Patient ID';
                return;
            }

            // Show loading state
            const button = document.querySelector('button');
            const originalText = button.textContent;
            button.textContent = '⏳ Verifying...';
            button.disabled = true;

            try {
                // Verify patient exists
                const response = await fetch(`${API_URL}/patient/${patientId}/exists`);
                const data = await response.json();
                
                if (data.exists) {
                    // Save patient ID to session storage
                    sessionStorage.setItem('patientId', patientId);
                    sessionStorage.setItem('patientName', data.name || `Patient ${patientId}`);
                    
                    // Redirect to chat page
                    window.location.href = 'index.html';
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = `⚠️ Patient ID ${patientId} not found in our system. Please check your ID or contact support.`;
                    button.textContent = originalText;
                    button.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.style.display = 'block';
                errorDiv.textContent = '⚠️ Unable to connect to server. Please try again later.';
                button.textContent = originalText;
                button.disabled = false;
            }
        }

        function fillId(id) {
            document.getElementById('patientId').value = id;
        }

        // Allow Enter key to submit
        document.getElementById('patientId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
