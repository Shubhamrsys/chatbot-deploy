<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareCompanion AI - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 550px;
            height: 800px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .header-info {
            flex: 1;
        }

        .header-info h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .patient-info {
            padding: 12px 20px;
            background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 13px;
        }

        .patient-details {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .patient-details span {
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f9fc;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #e2e8f0;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .bot .message-content {
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.6;
            display: block;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .quick-reply-btn {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .input-area {
            background: white;
            padding: 15px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .send-btn:hover {
            background: #764ba2;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🤖</div>
            <div class="header-info">
                <h2>CareCompanion AI</h2>
                <div class="status">
                    <span class="online-dot"></span>
                    <span id="statusText">Connected</span>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>

        <div class="patient-info" id="patientInfo">
            <div class="patient-details">
                <span>🆔 Loading patient...</span>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message bot">
                <div class="message-content">
                    Loading your health assistant...
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://chatbot-backend-cxpy.onrender.com/api';
        let currentPatientId = null;

        // Check if user is logged in
        function checkAuth() {
            currentPatientId = sessionStorage.getItem('patientId');
            if (!currentPatientId) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        // Load patient info
        async function loadPatientInfo() {
            try {
                const response = await fetch(`${API_URL}/patient/${currentPatientId}/info`);
                if (response.ok) {
                    const info = await response.json();
                    const infoDiv = document.getElementById('patientInfo');
                    infoDiv.innerHTML = `
                        <div class="patient-details">
                            <span>🆔 ID: ${info.patient_id}</span>
                            <span>🎂 Age: ${info.age}</span>
                            <span>⚥ Gender: ${info.gender}</span>
                            <span>📅 Appointments: ${info.appointment_count}</span>
                            ${info.conditions && info.conditions.length > 0 ? `<span>🏥 Conditions: ${info.conditions.slice(0, 2).join(', ')}</span>` : ''}
                        </div>
                    `;
                    
                    // Welcome message
                    addMessage(`👋 Welcome back, ${info.name || `Patient ${info.patient_id}`}! I'm your healthcare assistant. You have ${info.appointment_count} upcoming appointments. How can I help you today?`, false, [
                        { label: "📅 View Appointments", action: "view_appointments" },
                        { label: "📋 Prep Instructions", action: "prep_instructions" },
                        { label: "📍 Directions", action: "directions" }
                    ]);
                } else {
                    addMessage("⚠️ Unable to load your information. Please try logging in again.", false);
                }
            } catch (error) {
                console.error('Error loading patient info:', error);
                addMessage("⚠️ Connection error. Please make sure the backend is running.", false);
            }
        }

        async function sendToBackend(message) {
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        patient_id: parseInt(currentPatientId),
                        message: message
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                return data.response;
            } catch (error) {
                console.error('Chat error:', error);
                return "⚠️ Sorry, I'm having trouble connecting. Please make sure the backend is running.";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (message === "") return;
            
            addMessage(message, true);
            input.value = "";
            
            showTyping();
            const response = await sendToBackend(message);
            hideTyping();
            addMessage(response, false);
        }

        function sendQuickReply(action) {
            let message = "";
            if (action === 'view_appointments') message = "Show me my upcoming appointments";
            else if (action === 'prep_instructions') message = "What are the preparation instructions?";
            else if (action === 'directions') message = "Can I get directions?";
            else if (action === 'confirm') message = "Confirm my appointments";
            
            addMessage(message, true);
            showTyping();
            sendToBackend(message).then(response => {
                hideTyping();
                addMessage(response, false);
            });
        }

        function addMessage(text, isUser = false, quickReplies = null) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let content = `<div class="message-content">${text.replace(/\n/g, '<br>')}`;
            
            if (quickReplies && !isUser) {
                content += `<div class="quick-replies">`;
                quickReplies.forEach(reply => {
                    content += `<button class="quick-reply-btn" onclick="sendQuickReply('${reply.action}')">${reply.label}</button>`;
                });
                content += `</div>`;
            }
            
            content += `<span class="message-time">${time}</span></div>`;
            messageDiv.innerHTML = content;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function showTyping() {
            const messagesArea = document.getElementById('messagesArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `<div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            messagesArea.appendChild(typingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        // Initialize
        if (checkAuth()) {
            loadPatientInfo();
        }
    </script>
</body>
</html>
