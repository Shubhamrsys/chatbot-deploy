<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareCompanion AI - Healthcare Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 500px;
            height: 750px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .header-info {
            flex: 1;
        }

        .header-info h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .patient-selector {
            padding: 12px 20px;
            background: #f7f9fc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .patient-selector label {
            font-size: 13px;
            font-weight: bold;
            color: #475569;
        }

        .patient-selector select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            background: white;
            cursor: pointer;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f9fc;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #e2e8f0;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .bot .message-content {
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.6;
            display: block;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .quick-reply-btn {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .input-area {
            background: white;
            padding: 15px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .send-btn:hover {
            background: #764ba2;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🤖</div>
            <div class="header-info">
                <h2>CareCompanion AI</h2>
                <div class="status">
                    <span class="online-dot"></span>
                    <span id="statusText">Connecting...</span>
                </div>
            </div>
        </div>

        <div class="patient-selector">
            <label>👤 Patient:</label>
            <select id="patientSelect">
                <option value="1001">Patient 1001 (65, Male)</option>
                <option value="1002">Patient 1002 (72, Female)</option>
                <option value="1003">Patient 1003 (58, Male)</option>
                <option value="1004">Patient 1004 (45, Female)</option>
                <option value="1005">Patient 1005 (38, Male)</option>
            </select>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message bot">
                <div class="message-content">
                    👋 Hello! I'm CareCompanion AI. I can help you with appointments, preparation instructions, and directions. How can I help you today?
                    <div class="quick-replies">
                        <button class="quick-reply-btn" onclick="sendQuickReply('appointments')">📅 View Appointments</button>
                        <button class="quick-reply-btn" onclick="sendQuickReply('prep')">📋 Prep Instructions</button>
                        <button class="quick-reply-btn" onclick="sendQuickReply('directions')">📍 Directions</button>
                    </div>
                    <span class="message-time">Just now</span>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // IMPORTANT: Update this URL after deploying your backend to Render
        const API_URL = 'https://chatbot-backend-cxpy.onrender.com/api';
        
        let currentPatientId = 1001;

        async function sendToBackend(message) {
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        patient_id: currentPatientId,
                        message: message
                    })
                });
                
                const data = await response.json();
                return data.response;
            } catch (error) {
                console.error('Error:', error);
                return "⚠️ Sorry, I'm having trouble connecting. Please make sure the backend is running.";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (message === "") return;
            
            addMessage(message, true);
            input.value = "";
            
            showTyping();
            const response = await sendToBackend(message);
            hideTyping();
            addMessage(response, false);
        }

        function sendQuickReply(action) {
            let message = "";
            if (action === 'appointments') message = "Show me my upcoming appointments";
            else if (action === 'prep') message = "What are the preparation instructions?";
            else if (action === 'directions') message = "Can I get directions?";
            
            addMessage(message, true);
            showTyping();
            sendToBackend(message).then(response => {
                hideTyping();
                addMessage(response, false);
            });
        }

        function addMessage(text, isUser = false, quickReplies = null) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let content = `<div class="message-content">${text.replace(/\n/g, '<br>')}`;
            
            if (quickReplies && !isUser) {
                content += `<div class="quick-replies">`;
                quickReplies.forEach(reply => {
                    content += `<button class="quick-reply-btn" onclick="sendQuickReply('${reply.action}')">${reply.label}</button>`;
                });
                content += `</div>`;
            }
            
            content += `<span class="message-time">${time}</span></div>`;
            messageDiv.innerHTML = content;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function showTyping() {
            const messagesArea = document.getElementById('messagesArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `<div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            messagesArea.appendChild(typingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        document.getElementById('patientSelect').addEventListener('change', (e) => {
            currentPatientId = parseInt(e.target.value);
            addMessage(`🔄 Switched to ${e.target.options[e.target.selectedIndex].text}`, false);
        });

        document.getElementById('statusText').innerHTML = 'Online • Ready';
    </script>
</body>
</html>
